<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#08111f">
    <title>NeonWave hors ligne</title>
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            min-height: 100dvh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 28px;
            font-family: Inter, Arial, sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at 20% 0%, rgba(59,130,246,.32), transparent 35%),
                linear-gradient(160deg, #050912 0%, #111a38 55%, #05070f 100%);
        }
        main {
            width: min(420px, 100%);
            padding: 28px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 28px;
            background: rgba(11,18,38,.78);
            box-shadow: 0 24px 80px rgba(0,0,0,.45);
            text-align: center;
        }
        img {
            width: 84px;
            height: 84px;
            border-radius: 22px;
            box-shadow: 0 18px 42px rgba(37,99,235,.35);
        }
        h1 {
            margin: 22px 0 10px;
            font-size: 2rem;
            letter-spacing: -.05em;
        }
        p {
            margin: 0;
            color: #aebde2;
            line-height: 1.55;
        }
        button {
            margin-top: 24px;
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            color: #061020;
            background: #fff;
            font-weight: 900;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <main>
        <img src="/icons/icon-180.png" alt="NeonWave">
        <h1>Mode hors ligne</h1>
        <p>NeonWave est installe, mais le serveur musical n'est pas joignable pour le moment. Reconnecte-toi et relance l'app.</p>
        <button onclick="location.reload()">Reessayer</button>
    </main>
</body>
</html>
